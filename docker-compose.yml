version: '3.9'

services:
  tts-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: qwen-markel-tts:latest
    container_name: qwen-tts-server
    ports:
      - "8000:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - PORT=8000
      - PYTHONUNBUFFERED=1
      - HF_HOME=/cache/huggingface
    volumes:
      - ./cache:/cache
      - ./audio_output:/app/audio_output
    runtime: nvidia
    shm_size: 8gb
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
